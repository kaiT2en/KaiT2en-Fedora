<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="6 6 88 88" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title>SMC Chip</title>
  <desc>Chip icon</desc>
  <defs>
    <linearGradient id="chip-blue" x1="24" y1="24" x2="76" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b9f2ff"/>
      <stop offset="0.5" stop-color="#63bdf7"/>
      <stop offset="1" stop-color="#1f6fcd"/>
    </linearGradient>
    <linearGradient id="chip-orange" x1="8" y1="4" x2="93" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="0.52" stop-color="#ff9b3d"/>
      <stop offset="1" stop-color="#db5f1f"/>
    </linearGradient>
  </defs>

  <!-- outer chip pins -->
  <g fill="url(#chip-orange)">
    <rect x="24.2" y="10.4" width="4.6" height="13.2" rx="1.5"/>
    <rect x="35.9" y="10.4" width="4.6" height="13.2" rx="1.5"/>
    <rect x="47.7" y="10.4" width="4.6" height="13.2" rx="1.5"/>
    <rect x="59.5" y="10.4" width="4.6" height="13.2" rx="1.5"/>
    <rect x="71.2" y="10.4" width="4.6" height="13.2" rx="1.5"/>

    <rect x="24.2" y="76.4" width="4.6" height="13.2" rx="1.5"/>
    <rect x="35.9" y="76.4" width="4.6" height="13.2" rx="1.5"/>
    <rect x="47.7" y="76.4" width="4.6" height="13.2" rx="1.5"/>
    <rect x="59.5" y="76.4" width="4.6" height="13.2" rx="1.5"/>
    <rect x="71.2" y="76.4" width="4.6" height="13.2" rx="1.5"/>

    <rect x="10.4" y="24.2" width="13.2" height="4.6" rx="1.5"/>
    <rect x="10.4" y="35.9" width="13.2" height="4.6" rx="1.5"/>
    <rect x="10.4" y="47.7" width="13.2" height="4.6" rx="1.5"/>
    <rect x="10.4" y="59.5" width="13.2" height="4.6" rx="1.5"/>
    <rect x="10.4" y="71.2" width="13.2" height="4.6" rx="1.5"/>

    <rect x="76.4" y="24.2" width="13.2" height="4.6" rx="1.5"/>
    <rect x="76.4" y="35.9" width="13.2" height="4.6" rx="1.5"/>
    <rect x="76.4" y="47.7" width="13.2" height="4.6" rx="1.5"/>
    <rect x="76.4" y="59.5" width="13.2" height="4.6" rx="1.5"/>
    <rect x="76.4" y="71.2" width="13.2" height="4.6" rx="1.5"/>
  </g>

  <!-- chip body -->
  <rect x="20.5" y="20.5" width="59" height="59" rx="10.5" fill="url(#chip-orange)"/>
  <rect x="25.4" y="25.4" width="49.2" height="49.2" rx="7.2" fill="#fff3dd" opacity="0.22"/>
  <rect x="27.1" y="27.1" width="45.8" height="45.8" rx="6.3" fill="none" stroke="url(#chip-blue)" stroke-width="1.85"/>



  <!-- SMC mark -->
  <text x="50" y="56.7" text-anchor="middle" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="0.6" fill="url(#chip-blue)">SMC</text>
</svg>
